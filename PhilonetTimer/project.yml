name: PhilonetTimer
options:
  bundleIdPrefix: com.philonet
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:

  # ── Host App ──────────────────────────────────────────────
  PhilonetTimer:
    type: application
    platform: iOS
    sources:
      - path: PhilonetTimer
        group: PhilonetTimer
        excludes:
          - "*.entitlements"
      - path: Shared
        group: Shared
    info:
      path: PhilonetTimer/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.philonet.timer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PhilonetTimer/PhilonetTimer.entitlements
    entitlements:
      path: PhilonetTimer/PhilonetTimer.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.philonet.timer
    dependencies:
      - target: PhilonetShare

  # ── Share Extension ──────────────────────────────────────
  PhilonetShare:
    type: app-extension
    platform: iOS
    sources:
      - path: PhilonetShare
        group: PhilonetShare
        excludes:
          - "*.entitlements"
      - path: Shared
        group: Shared
    info:
      path: PhilonetShare/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: Philonet
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.philonet.timer.share
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PhilonetShare/PhilonetShare.entitlements
    entitlements:
      path: PhilonetShare/PhilonetShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.philonet.timer
