name: PhilonetTimer
options:
  bundleIdPrefix: com.philonet
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:

  # ── Host App ──────────────────────────────────────────────
  PhilonetTimer:
    type: application
    platform: iOS
    sources:
      - path: PhilonetTimer
        group: PhilonetTimer
      - path: Shared
        group: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.philonet.timer
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PhilonetTimer/PhilonetTimer.entitlements
    entitlements:
      path: PhilonetTimer/PhilonetTimer.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.philonet.timer
    dependencies:
      - target: PhilonetShare

  # ── Share Extension ──────────────────────────────────────
  PhilonetShare:
    type: app-extension
    platform: iOS
    sources:
      - path: PhilonetShare
        group: PhilonetShare
      - path: Shared
        group: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.philonet.timer.share
        INFOPLIST_FILE: PhilonetShare/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PhilonetShare/PhilonetShare.entitlements
    entitlements:
      path: PhilonetShare/PhilonetShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.philonet.timer
