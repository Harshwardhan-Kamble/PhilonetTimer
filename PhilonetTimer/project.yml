name: PhilonetTimer
options:
  bundleIdPrefix: com.philonet
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:

  # ── Host App ──────────────────────────────────────────────
  PhilonetTimer:
    type: application
    platform: iOS
    sources:
      - PhilonetTimer
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.philonet.timer
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PhilonetTimer/PhilonetTimer.entitlements
    dependencies:
      - target: PhilonetShare

  # ── Share Extension ──────────────────────────────────────
  PhilonetShare:
    type: app-extension
    platform: iOS
    sources:
      - PhilonetShare
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.philonet.timer.share
        INFOPLIST_FILE: PhilonetShare/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PhilonetShare/PhilonetShare.entitlements

  # ── Unit Tests ───────────────────────────────────────────
  PhilonetTimerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PhilonetTimerTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.philonet.timer.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PhilonetTimer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PhilonetTimer"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: PhilonetTimer

