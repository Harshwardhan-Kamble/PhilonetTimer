# ──────────────────────────────────────────────────────────────
# iOS Build — CI workflow for PhilonetTimer
#
# • Installs XcodeGen via Homebrew
# • Generates PhilonetTimer.xcodeproj from project.yml
# • Resolves Swift Package Manager dependencies (if any)
# • Builds for an iOS Simulator destination with code-signing disabled
# ──────────────────────────────────────────────────────────────

name: iOS Build

on:
  push:
  pull_request:
  workflow_dispatch:

# All build steps run from the PhilonetTimer/ subdirectory
# where project.yml and all source code live.
env:
  PROJECT_DIR: PhilonetTimer

jobs:
  build:
    name: Build PhilonetTimer
    runs-on: macos-latest
    defaults:
      run:
        working-directory: PhilonetTimer

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Print Xcode version ─────────────────────────────
      - name: Print Xcode version
        run: xcodebuild -version

      # ── 3. Install XcodeGen ────────────────────────────────
      - name: Install XcodeGen
        working-directory: .
        run: brew install xcodegen

      # ── 4. Generate Xcode project ─────────────────────────
      - name: Generate Xcode project
        run: |
          echo "📂 Working directory: $(pwd)"
          echo "📄 project.yml exists: $(test -f project.yml && echo YES || echo NO)"
          echo ""
          xcodegen generate --spec project.yml
          echo ""
          echo "✅ Generated project files:"
          ls -la *.xcodeproj || true

      # ── 5. List available schemes ──────────────────────────
      - name: List available schemes
        run: xcodebuild -project PhilonetTimer.xcodeproj -list

      # ── 6. Resolve SPM dependencies (if any) ──────────────
      - name: Resolve Swift Package Manager dependencies
        run: |
          if xcodebuild -project PhilonetTimer.xcodeproj -scheme PhilonetTimer -showBuildSettings 2>&1 | grep -q "SWIFT_PACKAGES"; then
            echo "📦 Resolving Swift Package Manager dependencies..."
            xcodebuild -project PhilonetTimer.xcodeproj \
              -scheme PhilonetTimer \
              -resolvePackageDependencies
          else
            echo "ℹ️  No SPM dependencies detected, skipping."
          fi

      # ── 7. Build for iOS Simulator ─────────────────────────
      - name: Build for iOS Simulator
        run: |
          set -o pipefail

          echo "🔨 Building PhilonetTimer..."
          echo ""
          echo "Project:     PhilonetTimer.xcodeproj"
          echo "Scheme:      PhilonetTimer"
          echo "Destination: Generic iOS Simulator"
          echo "Signing:     Disabled (CI build)"
          echo ""

          xcodebuild build \
            -project PhilonetTimer.xcodeproj \
            -scheme PhilonetTimer \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SYMROOT=build \
            | tee build.log

          echo ""
          echo "✅ Build succeeded!"

      # ── 8. Find available simulator ────────────────────────
      - name: Find available iOS Simulator
        id: simulator
        run: |
          # List available simulators and pick the first booted or available iPhone
          SIMULATOR_NAME=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime or 'SimRuntime.iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name'])
                          sys.exit(0)
          print('Any iOS Simulator Device')
          ")
          echo "simulator_name=${SIMULATOR_NAME}" >> "$GITHUB_OUTPUT"
          echo "📱 Using simulator: ${SIMULATOR_NAME}"

      # ── 9. Run unit tests ──────────────────────────────────
      - name: Run unit tests
        run: |
          set -o pipefail

          SIMULATOR="${{ steps.simulator.outputs.simulator_name }}"
          echo "🧪 Running PhilonetTimerTests..."
          echo ""
          echo "Project:     PhilonetTimer.xcodeproj"
          echo "Scheme:      PhilonetTimer"
          echo "Destination: ${SIMULATOR}"
          echo ""

          xcodebuild test \
            -project PhilonetTimer.xcodeproj \
            -scheme PhilonetTimer \
            -destination "platform=iOS Simulator,name=${SIMULATOR},OS=latest" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SYMROOT=build \
            -resultBundlePath TestResults.xcresult \
            | tee test.log

          echo ""
          echo "✅ All tests passed!"

      # ── 10. Print test summary ─────────────────────────────
      - name: Print test summary
        if: always()
        run: |
          echo "📊 Test Results Summary"
          echo "========================"
          if [ -f test.log ]; then
            grep -E "(Test Suite|Test Case|Executed|passed|failed|FAIL)" test.log || echo "No test output found"
          else
            echo "No test.log file found — tests may not have run."
          fi

      # ── 11. Zip and Upload Simulator App Bundle ────────────
      - name: Zip Simulator App Bundle
        if: success()
        run: |
          cd build/Debug-iphonesimulator
          zip -r ../../PhilonetTimer.zip PhilonetTimer.app

      - name: Publish Simulator Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PhilonetTimer-Simulator-Build
          path: PhilonetTimer/PhilonetTimer.zip
          if-no-files-found: error
          retention-days: 5
